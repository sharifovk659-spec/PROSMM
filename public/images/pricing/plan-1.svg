<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </linearGradient>
    <filter id="gray">
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <g filter="url(#gray)">
    <ellipse cx="320" cy="420" rx="200" ry="180" fill="#9a9a9a"/>
    <ellipse cx="320" cy="200" rx="95" ry="110" fill="#b0b0b0"/>
    <rect x="215" y="300" width="210" height="160" rx="40" fill="#a8a8a8"/>
    <path d="M280 175 Q320 130 360 175" fill="none" stroke="#888" stroke-width="8"/>
  </g>
  <!-- social icons -->
  <g transform="translate(500,60)">
    <circle r="18" fill="white" opacity="0.9"/>
    <path d="M-6 0 C-6 -8 6 -8 6 0 C6 8 -6 8 -6 0" fill="#ff3b5c" transform="scale(0.7)"/>
  </g>
  <g transform="translate(500,110)">
    <circle r="18" fill="white" opacity="0.9"/>
    <circle r="6" fill="none" stroke="#333" stroke-width="2"/>
  </g>
  <g transform="translate(500,160)">
    <circle r="18" fill="white" opacity="0.9"/>
    <path d="M-8 4 L0 -6 L8 4" fill="none" stroke="#333" stroke-width="2"/>
  </g>
  <!-- speech bubble -->
  <rect x="40" y="50" width="150" height="56" rx="28" fill="white" opacity="0.95"/>
  <polygon points="90,106 110,106 100,125" fill="white" opacity="0.95"/>
  <text x="115" y="86" text-anchor="middle" fill="#222" font-family="Arial,sans-serif" font-size="22" font-weight="bold">Я сам!</text>
</svg>
